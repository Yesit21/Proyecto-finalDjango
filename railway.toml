[build]
builder = "NIXPACKS"
buildCommand = "python3 -m pip install -r requirements.txt && npm install && npm run build && python manage.py collectstatic --noinput"

[deploy]
startCommand = "gunicorn restaurante_project.wsgi --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 100
