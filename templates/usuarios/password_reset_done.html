{% extends 'base/base.html' %}

{% block title %}Email Enviado{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-green-50 dark:bg-green-900 rounded-lg p-8">
            <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            
            <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">
                Email Enviado
            </h2>
            
            <p class="mt-2 text-gray-600 dark:text-gray-300">
                Hemos enviado las instrucciones para recuperar tu contraseña a tu email.
            </p>
            
            <p class="mt-4 text-sm text-gray-500 dark:text-gray-400">
                Si no recibes el email en unos minutos, revisa tu carpeta de spam.
            </p>
            
            <div class="mt-6">
                <a href="{% url 'usuarios:login' %}" class="btn-primary">
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
