{% extends 'base/base.html' %}
{% load static %}

{% block title %}Contraseña Cambiada - Restaurante{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 dark:bg-green-900/20">
                <svg class="h-8 w-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">
                ¡Contraseña Cambiada!
            </h2>
            
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Tu contraseña ha sido actualizada exitosamente
            </p>
        </div>

        <div class="rounded-md bg-green-50 dark:bg-green-900/20 p-4">
            <div class="flex">
                <div class="ml-3">
                    <p class="text-sm text-green-700 dark:text-green-300">
                        Ya puedes iniciar sesión con tu nueva contraseña
                    </p>
                </div>
            </div>
        </div>

        <div>
            <a href="{% url 'usuarios:login' %}" class="btn-primary w-full text-center block">
                Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
