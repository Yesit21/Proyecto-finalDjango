{% extends 'base/base.html' %}
{% block title %}Contraseña Actualizada{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8 rounded-2xl border border-white/20 bg-white/55 p-8 text-center shadow-2xl backdrop-blur-xl dark:border-white/10 dark:bg-gray-950/45">
        <div>
            <div class="mx-auto mb-4 inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-white/60 text-amber-700 shadow-sm ring-1 ring-black/5 backdrop-blur dark:bg-white/10 dark:text-amber-300 dark:ring-white/10">
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>

            <h2 class="text-2xl font-semibold tracking-tight text-gray-900 dark:text-white">
                Contraseña actualizada
            </h2>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-300">
                Ya puedes iniciar sesión con tu nueva contraseña.
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'usuarios:login' %}" class="btn-primary w-full">Iniciar sesión</a>
            <a href="{% url 'home' %}" class="btn-ghost w-full">Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
