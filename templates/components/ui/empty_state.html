<div class="empty-state">
    <div class="empty-state-icon">
        {% if icon %}
            {{ icon }}
        {% else %}
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-6 4h6M8 7h8M6 3h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2z"/>
            </svg>
        {% endif %}
    </div>
    <h3 class="empty-state-title">{{ title }}</h3>
    {% if description %}<p class="empty-state-text">{{ description }}</p>{% endif %}
    {% if action_url and action_label %}
        <div class="mt-5">
            <a href="{{ action_url }}" class="btn-primary">{{ action_label }}</a>
        </div>
    {% endif %}
</div>
