{% load static %}
<!DOCTYPE html>
<html lang="es" class="{% if dark_mode %}dark{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Restaurante{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'dist/css/output.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    {% include 'components/navbar/main.html' %}
    
    <main class="container mx-auto px-4 py-8 min-h-screen">
        {% include 'partials/messages.html' %}
        {% block content %}{% endblock %}
    </main>
    
    {% include 'components/footer/main.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script type="module" src="{% static 'src/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
