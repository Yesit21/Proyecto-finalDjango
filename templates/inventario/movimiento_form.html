{% extends 'base/base.html' %}
{% block title %}Registrar Movimiento{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm max-w-2xl mx-auto">
    <h1 class="text-3xl font-semibold mb-4">Registrar Movimiento</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Guardar movimiento</button>
        <a href="{% url 'inventario:lista' %}" class="btn-secondary">Volver</a>
    </form>
</div>
{% endblock %}
